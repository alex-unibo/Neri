<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 Monitor Cucina v2.0 - Ordini in Tempo Reale</title>
    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.8em;
            color: #1e3c72;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            font-weight: 700;
        }

        .company-subtitle {
            font-size: 1.2em;
            color: #2a5298;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(46, 204, 113, 0.1);
            padding: 8px 16px;
            border-radius: 25px;
            border: 2px solid #2ecc71;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* NAVIGATION */
        .navigation {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-button {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            display: none;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .breadcrumb {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
            font-weight: 500;
        }

        /* VISTA LISTA ORDINI */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .order-card.completed-order {
            background: rgba(46, 204, 113, 0.1);
            border: 2px solid #2ecc71;
            opacity: 0.8;
        }

        /* Varianti per ordini completati e modificati */
.order-card.completed-order .order-header {
    background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); /* Verde sfumato */
}

        .order-card.completed-order .order-name {
            text-decoration: line-through;
            opacity: 0.7;
        }
        .order-card.modified-order {
    border: 3px solid #e74c3c;
    box-shadow: 0 8px 32px rgba(231, 76, 60, 0.3);
    animation: modifiedOrderGlow 3s ease-in-out infinite;
}

.order-card.modified-order .order-header {
    background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); /* Arancione per differenziare */
}


@keyframes modifiedOrderGlow {
    0%, 100% { 
        box-shadow: 0 8px 32px rgba(231, 76, 60, 0.3);
    }
    50% { 
        box-shadow: 0 12px 40px rgba(231, 76, 60, 0.5);
    }
}

        .order-checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #2ecc71;
            z-index: 5;
            border-radius: 4px;
        
            border: 2px solid #e67e22;
            box-shadow: 0 8px 32px rgba(230, 126, 34, 0.3);
            animation: newOrderPulse 2s infinite;
        }

        @keyframes newOrderPulse {
            0% { 
                box-shadow: 0 8px 32px rgba(230, 126, 34, 0.3);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 12px 40px rgba(230, 126, 34, 0.5);
                transform: scale(1.02);
            }
            100% { 
                box-shadow: 0 8px 32px rgba(230, 126, 34, 0.3);
                transform: scale(1);
            }
        }

        .new-badge {
    position: absolute;
    top: 8px;   /* PIÙ IN BASSO (era -8px) */
    right: 15px; /* PIÙ A SINISTRA (era -8px) */
    background: linear-gradient(45deg, #ff6b35, #f7931e); /* Arancione acceso */
    color: white;
    font-size: 1.0em; /* Leggermente più piccolo */
    font-weight: bold;
    padding: 6px 12px; /* Padding ridotto */
    border-radius: 15px; /* Meno arrotondato */
    text-transform: uppercase;
    z-index: 10;
    box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4); /* Ombra più leggera */
    animation: newBadgePulse 2s ease-in-out infinite;
    transform: scale(1.0); /* Dimensione normale */
    border: 2px solid #fff; /* Bordo bianco per contrasto */
}


/* Animazione pulsante per il badge NEW */
@keyframes newBadgePulse {
    0%, 100% { 
        transform: scale(1.1);
        box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
    }
    50% { 
        transform: scale(1.2);
        box-shadow: 0 8px 25px rgba(255, 107, 53, 0.7);
    }
}
        .modified-badge {
    position: absolute;
    top: -5px;
    left: -5px;
    background: linear-gradient(45deg, #e74c3c, #c0392b);
    color: white;
    font-size: 0.8em;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 15px;
    text-transform: uppercase;
    z-index: 10;
    box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
    animation: modifiedPulse 2s ease-in-out infinite;
    cursor: pointer;
    transition: all 0.3s ease;
}

.modified-badge:hover {
    background: linear-gradient(45deg, #c0392b, #a93226);
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
}

.modified-badge:after {
    content: " 👆";
    font-size: 0.7em;
    opacity: 0.8;
}

@keyframes modifiedPulse {
    0%, 100% { 
        transform: scale(1);
        box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
    }
    50% { 
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
    }
}

        @keyframes badgeBounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-3px); }
        }

        .order-header {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); /* Rosso acceso sfumato */
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* Effetto luminoso per il gradiente rosso */
.order-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
}

        .order-name {
            font-size: 1.3em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .order-id {
            font-size: 0.8em;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .order-body {
            padding: 20px;
        }

        .order-date {
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(52, 152, 219, 0.2);
            flex: 1;
            margin: 0 5px;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: bold;

        .stat-label {
            font-size: 0.9em;
            color: #7f8c8d;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
        }

        .order-status {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-attivo {
            background: rgba(46, 204, 113, 0.2);
            color: #27ae60;
            border: 1px solid #2ecc71;
        }

        .view-details-btn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .view-details-btn:hover {
            background: linear-gradient(45deg, #2980b9, #1f4e79);
        }

        /* VISTA DETTAGLI */
        .details-view {
            display: none;
        }

        .details-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .details-title {
            font-size: 2em;

            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .details-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            text-align: center;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 10px;
            border: 2px solid rgba(52, 152, 219, 0.2);
        }

        .info-label {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .info-value {
            font-size: 1.2em;
            color: #2c3e50;
            font-weight: bold;
        }

        /* LISTA CIBO */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .food-item {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border-left: 5px solid #8e44ad;
            position: relative;
            cursor: pointer;
        }

        .food-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .food-item.completed {
            background: rgba(46, 204, 113, 0.1);
            border-left-color: #2ecc71;
        }

        .food-item.completed .food-name {
            text-decoration: line-through;
            color: #7f8c8d;
        }

        .food-item.completed .food-quantity {
            opacity: 0.6;
        }

        .food-checkbox {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 25px;
            height: 25px;
            cursor: pointer;
            accent-color: #2ecc71;
            transform: scale(1.3);
        }

        .food-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            text-transform: capitalize;
            padding-right: 40px; /* Spazio per checkbox */
        }

        .food-quantity {
            font-size: 2.2em;
            font-weight: bold;
            color: #8e44ad;
            text-align: center;
            background: rgba(142, 68, 173, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed #8e44ad;
        }

        .action-btn {
            background: linear-gradient(45deg, #0077ff, #0077ff);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: linear-gradient(45deg, #2980b9, #1f4e79);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        .action-btn.secondary {
            background: linear-gradient(45deg, #0077ff, #0077ff);
        }
        
        .action-btn.secondary:hover {
            background: linear-gradient(45deg, #0077ff, #0077ff);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }

        .action-btn.primary {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }
        
        .action-btn.primary:hover {
            background: linear-gradient(45deg, #229954, #27ae60);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }
        .action-btn.third {
            background: linear-gradient(45deg, #fc0000, #fc0000);
        }
        
        .action-btn.third:hover {
            background: linear-gradient(45deg, #fc0000, #fc0000);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }
        .action-btn.active {
    background: linear-gradient(45deg, #e67e22, #d35400) !important;
    color: white !important;
    font-weight: bold;
}
.action-btn.danger {
    background: linear-gradient(45deg, #e74c3c, #c0392b);
    color: white;
}

.action-btn.danger:hover {
    background: linear-gradient(45deg, #c0392b, #a93226);
    box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
}

        .order-card.selection-mode {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .order-card.selection-mode:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.3);
        }

        .order-card.selected {
            border: 3px solid #3498db;
            box-shadow: 0 8px 32px rgba(52, 152, 219, 0.4);
            background: rgba(52, 152, 219, 0.05);
        }

        .selection-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 25px;
            height: 25px;
            background: #3498db;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8em;
            z-index: 10;
        }

        .totals-view {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .totals-header {
            text-align: center;

        }

        .totals-header h2 {
            color: #2c3e50;

            margin-bottom: 10px;
        }

        .totals-subtitle {
            color: #7f8c8d;

        }

        .totals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .total-item {
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            border-radius: 12px;

        }

        .total-item:hover {
            transform: translateY(-2px);

            opacity: 0.6;
        }

        .total-item-checkbox {
            position: absolute;

            height: 20px;
            cursor: pointer;
            accent-color: #2ecc71;
            z-index: 5;

        }

        .total-item-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            padding-right: 40px; /* Spazio per checkbox */
        }

            font-weight: bold;
            color: #8e44ad;

            background: rgba(142, 68, 173, 0.1);
            padding: 15px;
            border-radius: 8px;
        }

        /* STATI VUOTI E LOADING */
        .loading, .no-orders, .no-food {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin: 20px;
        }

        .loading {
            color: #3498db;
            font-size: 1.2em;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;

        @keyframes spin {

        }

            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
        }

<body>
    <div class="header">
        <h1>Monitor Cucina</h1>
        <div class="company-subtitle">Neri Gestione Catering</div>
        <div class="status">
            <div class="status-item">
                <div class="status-dot"></div>
                <span id="connection-status">Connessione...</span>
            </div>
            <div class="status-item">
                <span>📋 <span id="order-count">0</span> ordini totali</span>
            </div>
            <div class="status-item">
                <span>📅 <span id="date-count">0</span> date attive</span>
            </div>
            <div class="status-item">
                <span>🕒 <span id="last-update">--:--</span></span>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- NAVIGAZIONE -->
        <div class="navigation">
            <button class="back-button" id="back-button">

async function loadOrders() {
    // 🛡️ PROTEZIONE CONTRO CHIAMATE MULTIPLE (AGGIUNGI ALL'INIZIO)
    const now = Date.now();
    if (isLoadingOrders) {
        console.log('🚫 loadOrders già in esecuzione, chiamata ignorata');
        return Promise.resolve();
    }
    
    isLoadingOrders = true;
    lastLoadTime = now;
    
    try {
        showLoading();
        
        if (USE_FIREBASE) {
            // ===== CARICA DA FIREBASE CON FILTRO MIGLIORATO =====
            console.log('🔥 Tentativo connessione Firebase...');
            
            // Rimuovi listener precedente se esiste
            if (firebaseListener) {
                firebaseListener();
                firebaseListener = null;
                console.log('🔄 Listener Firebase precedente rimosso');
            }
            
            const ordersSnapshot = await db.collection('ordini_singoli').get();
            console.log(`📊 Firebase: trovati ${ordersSnapshot.size} documenti`);
            
            if (ordersSnapshot.empty) {
                console.log('⚠️ Firebase: nessun ordine trovato');
                allOrders = [];
                updateStatus({ordini: [], totale_ordini: 0});
                setConnectionStatus(true, 'Firebase Online (vuoto)');
                updateFilters();
                applyFilters();
                return Promise.resolve();
            }
            
            // 🔥 USA MAP PER PREVENIRE DUPLICATI E FILTRARE ORDINI CANCELLATI
            const ordersMap = new Map();
            let filteredOut = 0;
            
            for (const doc of ordersSnapshot.docs) {
                const orderData = doc.data();
                
                // 🔥 FILTRO 1: Ordini temporanei
                const nomeCliente = orderData.info?.nome_cliente || '';
                if (nomeCliente.startsWith('~$') || nomeCliente.includes('~$')) {
                    filteredOut++;
                    continue;
                }
                
                // 🔥 FILTRO 2: Ordini senza contenuto valido
                if (!orderData.info || !orderData.info.nome_cliente) {
                    console.log(`⏭️ Saltando ordine senza info valide: ${doc.id}`);
                    filteredOut++;
                    continue;
                }
                
                // 🔥 FILTRO 3: Ordini con nome cliente vuoto o sospetto
                const nomeClientePulito = nomeCliente.trim();
                if (!nomeClientePulito || nomeClientePulito.length < 2) {
                    console.log(`⏭️ Saltando ordine con nome troppo corto: "${nomeCliente}"`);
                    filteredOut++;
                    continue;
                }
                
                // 🔥 FILTRO 4: Ordini con 0 prodotti (probabilmente corrotti)
                const prodottiCount = Object.keys(orderData.cibo || {}).length;
                if (prodottiCount === 0) {
                    console.log(`⏭️ Saltando ordine senza prodotti: ${nomeCliente} (${doc.id})`);
                    filteredOut++;
                    continue;
                }
                
                // 🔥 FILTRO 5: Ordini con pattern di nomi sospetti (come server_09-08-2025)
                if (nomeClientePulito.includes('_') && /\d{2}-\d{2}-\d{4}/.test(nomeClientePulito)) {
                    console.log(`⏭️ Saltando ordine con pattern sospetto: ${nomeCliente}`);
                    filteredOut++;
                    continue;
                }
                
                const orderId = orderData.id || doc.id;
                
                // PREVIENI DUPLICATI usando Map
                if (!ordersMap.has(orderId)) {
                    ordersMap.set(orderId, {
                        id: orderId,
                        nome_cliente: orderData.info.nome_cliente,
                        data_evento: orderData.info.data_evento || null,
                        filename: orderData.info.filename || '',
                        prodotti_count: prodottiCount,
                        stato: orderData.stato || 'attivo',
                        ultimo_aggiornamento: orderData.ultimo_aggiornamento || new Date().toISOString(),
                        cibo: orderData.cibo || {}
                    });
                } else {
                    console.warn(`⚠️ Mac: Ordine duplicato ignorato: ${orderId}`);
                    filteredOut++;
                }
            }
            
            // Converti Map in Array
            const ordiniPuliti = Array.from(ordersMap.values());
            console.log(`✅ Filtrato: ${ordiniPuliti.length} ordini validi, ${filteredOut} ordini scartati`);
            
            const hasNewOrders = checkForNewOrders(ordiniPuliti);
            allOrders = ordiniPuliti;
            updateStatus({ordini: ordiniPuliti, totale_ordini: ordiniPuliti.length});
            setConnectionStatus(true, 'Firebase Online');
            
        } else {
            // ===== IL TUO CODICE SERVER LOCALE ESISTENTE =====
            // (mantieni invariato)
        }
        
        // Il resto della tua funzione loadOrders esistente...
        updateFilters();
        applyFilters();

        if (showingTotals) {
            setTimeout(async () => {
                await checkTotalsModifications();
            }, 500);
        }

        return Promise.resolve();
        
    } catch (error) {
        console.error('Errore caricamento ordini:', error);
        setConnectionStatus(false, 'Errore Connessione');
        showError(`Impossibile connettersi: ${error.message}`);
        return Promise.reject(error);
    } finally {
        // 🛡️ IMPORTANTE: Rilascia il lock sempre
        isLoadingOrders = false;
    }
}

        function updateFilters() {
            // Aggiorna filtro date
            const dateFilter = document.getElementById('filter-date');
            const currentSelection = dateFilter.value; // Salva selezione corrente
            
            const dates = [...new Set(allOrders.map(o => o.data_evento).filter(d => d))].sort();
            
            // Pulisci opzioni esistenti (tranne la prima)
            while (dateFilter.children.length > 1) {
                dateFilter.removeChild(dateFilter.lastChild);
            }
            
            // Aggiungi nuove date
            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = formatDate(date);
                dateFilter.appendChild(option);
            });
            
            // Ripristina la selezione precedente
            if (currentSelection && dates.includes(currentSelection)) {
                dateFilter.value = currentSelection;
            }
        }
        

        function applyFilters() {
    const dateFilter = document.getElementById('filter-date').value;
    const sortFilter = document.getElementById('sort-orders').value;
    
    // 🔥 CORREZIONE: Logica di filtro combinato CORRETTA
    filteredOrders = allOrders.filter(order => {
        // ===== PRIMO: Applica filtro DATA (se presente) =====
        
        // Filtro data specifica
        if (dateFilter && order.data_evento !== dateFilter) {
            return false; // Escludi ordini di altre date
        }
        
        // Filtro "Solo Oggi" (solo se NON c'è una data specifica)
        if (!dateFilter && todayFilterActive) {
            const today = getTodayDateString();
            if (order.data_evento !== today) {
                return false; // Escludi ordini di altre date
            }
        }
        
        // ===== SECONDO: Applica filtro STATO (se presente) =====
        
        // Filtro "Da Fare" (si applica DOPO il filtro data)
        if (todoFilterActive) {
            if (completedOrders.has(order.id)) {
                return false; // Escludi ordini completati
            }
        }
        
        // Se arriva qui, l'ordine passa tutti i filtri attivi
        return true;
    });
    
    // Ordina
    filteredOrders.sort((a, b) => {
        switch (sortFilter) {
            case 'date-asc':
                return (a.data_evento || '9999-12-31').localeCompare(b.data_evento || '9999-12-31');
            case 'date-desc':
                return (b.data_evento || '0000-01-01').localeCompare(a.data_evento || '0000-01-01');
            case 'name-asc':
                return a.nome_cliente.localeCompare(b.nome_cliente);
            case 'name-desc':
                return b.nome_cliente.localeCompare(a.nome_cliente);
            default:
                return 0;
        }
    });
    
    // Mostra ordini filtrati
    if (currentView === 'list') {
        displayOrders();
    }
    
    // Aggiorna contatori con logica corretta
    updateFilterCountersFixed();
    
    // Log dettagliato dei filtri attivi
    logActiveFiltersFixed();
}

        console.log(`🔍 DEBUG: Chiavi snapshotCibo: ${Object.keys(snapshotCibo).length}`);
        
        const changes = [];
        
        // Controlla prodotti modificati o aggiunti
        Object.values(currentCibo).forEach((currentItem, index) => {
            const currentName = currentItem.nome;

            // Trova il prodotto corrispondente nello snapshot

                    type: 'added',
                    name: currentName,
                    quantity: currentQuantity,
                    itemId: itemId,
                    index: index
                });
                console.log(`➕ Prodotto aggiunto: ${currentName}`);
            } else if (snapshotItem.quantita !== currentQuantity) {
                // Quantità modificata
                changes.push({
                    type: 'modified',
                    name: currentName,
                    oldQuantity: snapshotItem.quantita,
                    newQuantity: currentQuantity,
                    itemId: itemId,
                    index: index
                });
                console.log(`🔄 Prodotto modificato: ${currentName} (${snapshotItem.quantita} → ${currentQuantity})`);
            }
        });
        
        // Controlla prodotti rimossi
        Object.values(snapshotCibo).forEach((snapshotItem, index) => {
            const snapshotName = snapshotItem.nome;
            const currentItem = Object.values(currentCibo).find(item => item.nome === snapshotName);
            const itemId = `${orderId}-${snapshotName.replace(/[^a-zA-Z0-9]/g, '_')}`;
            
            if (!currentItem) {
                // Prodotto rimosso
                changes.push({
                    type: 'removed',
                    name: snapshotName,
                    quantity: snapshotItem.quantita,
                    itemId: itemId,
                    index: index
                });
                console.log(`❌ Prodotto rimosso: ${snapshotName}`);
            }
        });
        
        console.log(`🔍 DEBUG: Trovate ${changes.length} modifiche`);
        return changes.length > 0 ? changes : null;
        
    } catch (error) {

    }

// Nuova funzione per rimuovere le spunte dalle referenze modificate
async function removeCompletedItemsForModifiedOrder(orderId) {
    console.log(`🔄 Controllo modifiche per ordine ${orderId}...`);
    
    const changes = await getOrderChanges(orderId);
    
    if (!changes || changes.length === 0) {
        console.log(`✅ Nessuna modifica rilevata per ordine ${orderId}`);
        return false;
    }
    
    console.log(`⚠️ Trovate ${changes.length} modifiche per ordine ${orderId}:`, changes);
    
    let itemsToRemove = [];
    let hasNewProducts = false;
    let hasModifiedProducts = false;
    
    // Per ogni modifica, determina quali referenze gestire
    changes.forEach(change => {
        switch (change.type) {
            case 'modified':
                itemsToRemove.push(change.itemId);
                hasModifiedProducts = true;
                console.log(`🔄 Modifica quantità rilevata: ${change.name} (${change.oldQuantity} → ${change.newQuantity})`);
                break;
                
            case 'added':
                hasNewProducts = true;
                console.log(`➕ Prodotto aggiunto: ${change.name} (${change.quantity}) - NON sarà auto-completato`);
                break;
                
            case 'removed':
                itemsToRemove.push(change.itemId);
                console.log(`❌ Prodotto rimosso: ${change.name} (era ${change.quantity})`);
                break;
        }
    });
    
    // Rimuovi le spunte dalle referenze modificate/rimosse
    let removedCount = 0;
    itemsToRemove.forEach(itemId => {
        if (completedItems.has(itemId)) {
            completedItems.delete(itemId);
            removedCount++;
            console.log(`🚫 Rimossa spunta da referenza: ${itemId}`);
        }
    });
    
    // Rimuovi completamento ordine se ci sono modifiche significative
    if ((hasNewProducts || hasModifiedProducts || removedCount > 0) && completedOrders.has(orderId)) {
        completedOrders.delete(orderId);
        saveCompletedOrdersToFirebase();
        console.log(`🔄 Rimosso completamento ordine generale: ordine modificato`);
        
        // Rimuovi anche il timestamp di completamento
        const completionTimes = JSON.parse(localStorage.getItem('orderCompletionTimes') || '{}');
        delete completionTimes[orderId];
        localStorage.setItem('orderCompletionTimes', JSON.stringify(completionTimes));
    }
    
    if (removedCount > 0 || hasNewProducts || hasModifiedProducts) {
        // Salva le modifiche
        saveCompletedItemsToFirebase();
        
        // 🔥 USA LA FUNZIONE FORCE per mostrare immediatamente il badge
        console.log(`🔶 FORZA badge MODIFICATO per ordine ${orderId}...`);
        forceShowModifiedBadge(orderId);
        
        // Poi chiama anche la versione normale per Firebase (in background)
        setTimeout(() => {
            markOrderAsModified(orderId);
        }, 100);
        
        console.log(`✅ Gestite modifiche: ${removedCount} spunte rimosse, nuovi prodotti: ${hasNewProducts}, prodotti modificati: ${hasModifiedProducts}`);
        return true;
    }
    
    return false;
}

    if (!confirmation) {
        return;

    try {

            method: 'POST',

            },
            body: JSON.stringify({ orderIds: orderIds })
        });
        
        if (!response.ok) {
            throw new Error(`Errore server HTTP ${response.status}: ${response.statusText}`);
        }
        
        const result = await response.json();
        console.log('📋 Risultato cancellazione:', result);
        
        if (result.success) {
            // 🔥 PULISCI ANCHE GLI STATI ASSOCIATI AGLI ORDINI CANCELLATI

            if (result.deletedFiles && result.deletedFiles.length > 0) {
                message += `\n📁 ${result.deletedFiles.length} file spostati in _cancellati`;

            if (result.errors && result.errors.length > 0) {
                message += `\n⚠️ Alcuni errori: ${result.errors.length}`;

            setTimeout(async () => {
                console.log('🔄 Ricaricamento ordini dopo cancellazione...');
                await loadOrders();
            }, 3000);
            
        } else {
            throw new Error(result.error || 'Errore durante la cancellazione');
        }
        
    } catch (error) {
        console.error('❌ Errore durante la cancellazione completa:', error);
        
        let errorMessage = '❌ Errore durante la cancellazione:\n';
        
        if (error.message.includes('fetch')) {
            errorMessage += 'Impossibile contattare il server. Assicurati che sia in esecuzione.';
        } else {
            errorMessage += error.message;
        }
        
        alert(errorMessage);
    }
}

// Funzione per eliminare automaticamente ordini vecchi
async function autoDeleteOldOrders() {
    console.log('🧹 Controllo ordini da eliminare (>24h)...');
    
    const now = new Date();
    const ordersToDelete = [];
    
    // Trova ordini con data evento passata di oltre 24h
    allOrders.forEach(order => {
        if (!order.data_evento) return; // Salta ordini senza data
        
        try {
            // Converte "DD/MM/YYYY" in oggetto Date
const parts = order.data_evento.split('/');
const orderDate = new Date(parts[2], parts[1] - 1, parts[0]);

// Aggiunge 24 ore alla data dell'ordine
const expiryDate = new Date(orderDate.getTime() + (24 * 60 * 60 * 1000));

// 🔍 DEBUG: Mostra date per debug
console.log(`🔍 Ordine: ${order.nome_cliente}`);
console.log(`📅 Data evento: ${order.data_evento}`);
console.log(`📅 Data parsed: ${orderDate}`);
console.log(`⏰ Scadenza: ${expiryDate}`);
console.log(`⏰ Ora attuale: ${now}`);
console.log(`❓ Da eliminare: ${now > expiryDate}`);

if (now > expiryDate) {
    ordersToDelete.push(order.id);
    console.log(`🗑️ Ordine da eliminare: ${order.nome_cliente} (${order.data_evento})`);
}
        } catch (error) {
            console.warn(`⚠️ Errore parsing data ordine ${order.id}:`, error);
        }
    });
    
    if (ordersToDelete.length === 0) {
        console.log('✅ Nessun ordine da eliminare');
        return;
    }
    
    console.log(`🧹 Eliminando ${ordersToDelete.length} ordini scaduti...`);
    
    try {
        if (USE_FIREBASE) {
            // Elimina da Firebase
            const batch = db.batch();
            ordersToDelete.forEach(orderId => {
                const docRef = db.collection('ordini_singoli').doc(orderId);
                batch.delete(docRef);
            });
            await batch.commit();
            console.log(`✅ ${ordersToDelete.length} ordini eliminati da Firebase`);
        } else {
            // Elimina da server locale
            const response = await fetch(`${SERVER_URL}/api/delete-orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderIds: ordersToDelete })
            });
            
            if (response.ok) {
                console.log(`✅ ${ordersToDelete.length} ordini eliminati dal server`);
            }
        }
        
        // Ricarica ordini
        await loadOrders();
        
    } catch (error) {
        console.error('❌ Errore auto-eliminazione:', error);
    }
}

    setTimeout(autoDeleteOldOrders, 5000); // Dopo 5 secondi dall'avvio
    
    // Poi ogni 30 secondi (stesso intervallo dell'aggiornamento ordini)
    setInterval(autoDeleteOldOrders, 30 * 1000); // 30 secondi
    console.log('🧹 Auto-cleanup attivato (controllo ogni 30 secondi)');
}

        async function loadCompletedItems() {
    try {
        const doc = await db.collection('monitor_state').doc('completed_items').get();
        if (doc.exists) {
            const data = doc.data();
            completedItems = new Set(data.items || []);
            console.log(`📋 Caricati ${completedItems.size} prodotti completati da Firebase`);
        } else {
            console.log('📋 Nessun dato spunte trovato su Firebase');

        completedItems = new Set(); // Fallback vuoto
    }
}
            
        // Carica ordini visualizzati e conosciuti dal localStorage
        async function loadViewedOrders() {
        try {
        // Carica ordini completati da Firebase
        const completedDoc = await db.collection('monitor_state').doc('completed_orders').get();
        if (completedDoc.exists) {
            const data = completedDoc.data();
            completedOrders = new Set(data.orders || []);
            console.log(`📋 Caricati ${completedOrders.size} ordini completati da Firebase`);
        } else {
            completedOrders = new Set();
        }
        
        // Per ora manteniamo viewedOrders e knownOrderIds in localStorage
        // (li convertiremo dopo se necessario)
        const savedViewed = localStorage.getItem('viewedOrders');
        if (savedViewed) {
            const items = JSON.parse(savedViewed);
            viewedOrders = new Set(items);
        }
        
        const savedKnown = localStorage.getItem('knownOrderIds');
        if (savedKnown) {
            const items = JSON.parse(savedKnown);
            knownOrderIds = new Set(items);
        }
        
    } catch (e) {
        console.warn('Errore nel caricamento degli ordini:', e);
        viewedOrders = new Set();
        knownOrderIds = new Set();
        completedOrders = new Set();
    }
}

        function startAutoUpdate() {
            updateTimer = setInterval(() => {
                console.log('🔄 Aggiornamento automatico...');
                
                // 🛡️ NUOVO: Protezione contro sovrapposizioni su Mac
                const now = Date.now();
                if (isLoadingOrders || (now - lastLoadTime < 2000)) {
                    console.log('🚫 Auto-update saltato (chiamata già in corso o troppo recente)');
                    return;
                }
                
                // NON aggiornare se siamo in modalità selezione (ma PERMETTI se mostrando totali)
                if (selectionMode) {
                    console.log('⏸️ Auto-update sospeso (modalità selezione attiva)');
                    return;
                }
        
                // Se siamo in modalità totali, aggiorna SOLO allOrders senza cambiare vista
                if (showingTotals) {
                    console.log('🔄 Aggiornamento dati in background (modalità totali)');
                    loadOrders(); // Questo aggiornerà allOrders e triggererà checkTotalsModifications
                    return;
                }
                
                // 🔥 NUOVO: Imposta il flag per indicare che è un aggiornamento automatico
                isAutoUpdating = true;
                
                // Salva lo stato corrente dei filtri
                const savedFilters = {
                    date: document.getElementById('filter-date').value,
                    sort: document.getElementById('sort-orders').value
                };
                
                if (currentView === 'list') {
                    loadOrders().then(() => {
                        console.log('✅ allOrders aggiornato durante auto-update');
                        // Ripristina i filtri dopo il caricamento
                        document.getElementById('filter-date').value = savedFilters.date;
                        document.getElementById('sort-orders').value = savedFilters.sort;
                        applyFilters();
                    }).catch(error => {
                        console.error('❌ Errore durante auto-update:', error);
                    });
                } else if (currentView === 'details' && currentOrderId) {
                    // Ricarica solo i dettagli dell'ordine corrente
                    showOrderDetails(currentOrderId);
                }
            }, UPDATE_INTERVAL);
        }
        
        

        function stopAutoUpdate() {
            if (updateTimer) {
                clearInterval(updateTimer);
            }
        }

        // Utility functions
        function formatDate(dateStr) {
            if (!dateStr) return 'Data non specificata';
            
            try {
                // Converte "DD/MM/YYYY" in oggetto Date
                const parts = dateStr.split('/');
                const date = new Date(parts[2], parts[1] - 1, parts[0]);
                
                const options = { 
                    weekday: 'short', 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                };
                return date.toLocaleDateString('it-IT', options);
            } catch (e) {
                return dateStr;
            }
        }
