<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 Monitor Cucina v3.0 - Ordini in Tempo Reale</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #333;
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.8em;
            color: #1e3c72;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            font-weight: 700;
        }

        .company-subtitle {
            font-size: 1.2em;
            color: #2a5298;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== STATUS BAR ===== */
        .status {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(46, 204, 113, 0.1);
            padding: 8px 16px;
            border-radius: 25px;
            border: 2px solid #2ecc71;
            transition: all 0.3s ease;
        }

        .status-item.error {
            background: rgba(231, 76, 60, 0.1);
            border-color: #e74c3c;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-item.error .status-dot {
            background: #e74c3c;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== NAVIGATION ===== */
        .navigation {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .back-button {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: none;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .breadcrumb {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        /* ===== FILTERS ===== */
        .filters {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .filters-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }

        .filter-input {
            padding: 10px 15px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .filter-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .filter-button {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }

        .filter-button.active {
            background: linear-gradient(45deg, #e67e22, #f39c12);
        }

        .filter-button.da-fare {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
        }

        .filter-button.da-fare:hover {
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        /* ===== SELECTION BAR ===== */
        .selection-bar {
            margin-top: 15px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border: 2px solid #3498db;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .selection-info {
            font-weight: 600;
            color: #2c3e50;
        }

        .selection-actions {
            display: flex;
            gap: 10px;
        }

        .action-button {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .action-button.secondary {
            background: linear-gradient(45deg, #95a5a6, #7f8c8d);
        }

        .action-button.secondary:hover {
            box-shadow: 0 4px 12px rgba(149, 165, 166, 0.3);
        }

        /* ===== ORDERS GRID ===== */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            border-color: #3498db;
        }

        .order-card.selected {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.1);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
        }

        .order-card.selection-mode {
            cursor: pointer;
            position: relative;
        }

        .order-card.selection-mode::before {
            content: '';
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            background: white;
        }

        .order-card.selected.selection-mode::before {
            background: #3498db;
            border-color: #3498db;
        }

        .order-card.selected.selection-mode::after {
            content: '✓';
            position: absolute;
            top: 12px;
            right: 14px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .order-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
        }

        .order-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .badge-new {
            background: #e74c3c;
        }

        .badge-modified {
            background: #f39c12;
        }

        .order-info {
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .info-label {
            font-weight: 600;
            color: #7f8c8d;
        }

        .info-value {
            color: #2c3e50;
        }

        .order-products {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }

        .products-summary {
            font-size: 12px;
            color: #7f8c8d;
            text-align: center;
        }

        /* ===== DETAIL VIEW ===== */
        .detail-view {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .detail-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .detail-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .food-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .food-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .food-item.completed {
            background: #d5f4e6;
            border-color: #27ae60;
        }

        .food-name {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .food-quantity {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* ===== FOOTER ===== */
        .footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            margin-top: 30px;
            border-radius: 15px 15px 0 0;
        }

        .footer p {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .filters-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .orders-grid {
                grid-template-columns: 1fr;
            }
            
            .detail-info {
                grid-template-columns: 1fr;
            }
        }

        /* ===== TOTALS VIEW ===== */
        .totals-view {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .totals-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .totals-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .totals-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .totals-stat {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            min-width: 120px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #3498db;
        }

        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .totals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .total-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 5px solid #3498db;
            transition: all 0.3s ease;
        }

        .total-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .total-name {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .total-quantity {
            color: #3498db;
            font-size: 24px;
            font-weight: 700;
        }

        .total-orders {
            color: #7f8c8d;
            font-size: 12px;
            margin-top: 5px;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 18px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <h1>🍳 Monitor Cucina</h1>
        <div class="company-subtitle">Ristorante Neri - Sistema v3.0</div>
        
        <div class="status">
            <div class="status-item" id="connection-status">
                <div class="status-dot"></div>
                <span id="connection-text">Connessione...</span>
            </div>
            <div class="status-item">
                <span>📋 Ordini: <strong id="order-count">0</strong></span>
            </div>
            <div class="status-item">
                <span>📅 Date: <strong id="date-count">0</strong></span>
            </div>
            <div class="status-item">
                <span>🕒 Aggiornato: <strong id="last-update">--:--</strong></span>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- NAVIGATION -->
        <div class="navigation">
            <button class="back-button" id="back-button">← Torna alla Lista</button>
            <div class="breadcrumb" id="breadcrumb">Lista Ordini</div>
        </div>

        <!-- FILTERS -->
        <div class="filters" id="filters">
            <div class="filters-row">
                <div class="filter-group">
                    <label class="filter-label">Data</label>
                    <input type="date" class="filter-input" id="filter-date">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Stato</label>
                    <select class="filter-input" id="filter-stato">
                        <option value="">Tutti</option>
                        <option value="attivo">Attivo</option>
                        <option value="completato">Completato</option>
                    </select>
                </div>
                <button class="filter-button" id="filter-today">📅 Solo Oggi</button>
                <button class="filter-button" id="filter-da-fare">📝 Da Fare</button>
                <button class="filter-button" id="show-totals">📊 Totali</button>
                <button class="filter-button" id="clear-filters">🔄 Reset</button>
            </div>
            
            <!-- SELECTION MODE BAR -->
            <div class="selection-bar" id="selection-bar" style="display: none;">
                <div class="selection-info">
                    <span id="selection-count">0 ordini selezionati</span>
                </div>
                <div class="selection-actions">
                    <button class="action-button" id="calculate-totals">🧮 Calcola Totali</button>
                    <button class="action-button secondary" id="cancel-selection">❌ Annulla</button>
                </div>
            </div>
        </div>

        <!-- LIST VIEW -->
        <div id="list-view">
            <div class="orders-grid" id="orders-container">
                <!-- Gli ordini verranno inseriti qui -->
            </div>
        </div>

        <!-- DETAIL VIEW -->
        <div class="detail-view" id="detail-view">
            <div class="detail-header">
                <div class="detail-title" id="detail-title">Dettagli Ordine</div>
                <div class="detail-info" id="detail-info">
                    <!-- Info ordine verranno inserite qui -->
                </div>
            </div>
            
            <div class="food-section">
                <div class="section-title">🍽️ Prodotti Ordinati</div>
                <div class="food-grid" id="food-container">
                    <!-- Prodotti verranno inseriti qui -->
                </div>
            </div>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <div>Caricamento ordini...</div>
        <!-- LOADING -->
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <div>Caricamento ordini...</div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>🔥 Connesso a <span id="server-info">Firebase Cloud</span> • Aggiornamento automatico ogni 30 secondi</p>
    </div>
